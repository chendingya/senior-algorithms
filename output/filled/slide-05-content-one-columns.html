<!DOCTYPE html><html lang="zh-CN"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, height=1080">
  <title>Content-One-Columns</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    .slide {
      width: 1920px;
      height: 1080px;
      background-color: #FFFFFF;
      font-family: 'PingFang SC', 'Microsoft YaHei', 'PingFang TC', 'Hiragino Sans GB', sans-serif;
      position: relative;
      overflow: hidden;
    }
    .title-block {
      position: absolute;
      left: 80px;
      top: 100px;
      width: 1680px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .title-block [data-slot="title"] {
      font-weight: 600;
      font-size: 64px;
      line-height: 1.25;
      color: #000000;
    }
    .title-block [data-slot="subtitle"] {
      font-weight: 400;
      font-size: 40px;
      line-height: 1.4;
      color: #000000;
      /* 等效灰色（避免 opacity 导出丢失） */
      color: #666666; /* black @ 60% on white */
    }
    .content-row {
      position: absolute;
      left: 80px;
      top: 304px;
      width: 1760px;
      display: flex;
      flex-direction: row;
      gap: 32px;
      height: 676px; /* 固定高度：更美观、更稳定 */
      align-items: stretch;
    }
    .content-block {
      flex: 1;
      background-color: #F1F1F1;
      border-radius: 16px;
      padding: 40px 56px;
      display: flex;
      flex-direction: column;
      gap: 32px;
      height: 676px; /* 与行容器保持一致 */
    }
    .content-block .block-inner {
      display: flex;
      flex-direction: column;
      gap: 24px;
      min-height: 283px;
    }
    .content-block [data-slot$="Heading"] {
      font-weight: 500;
      font-size: 40px;
      line-height: 1.22;
      color: #000000;
    }
    .content-block [data-slot$="Copy"] {
      font-weight: 400;
      font-size: 28px;
      line-height: 1.43;
      color: #000000;
      /* 等效灰色（避免 opacity 导出丢失） */
      color: #4D4D4D; /* black @ 70% on white */
      flex: 1;
    }
  </style>
</head>
<body>
  <div class="slide" data-template="content-one-columns">
    <div class="title-block">
      <h1 data-slot="title">碰撞检测问题的形式化定义</h1>
      <p data-slot="subtitle">Formal Definition</p>
    </div>
    <div class="content-row">
      <div class="content-block">
        <div class="block-inner">
          <h2 data-slot="block1Heading">输入与输出</h2>
          <p data-slot="block1Copy">输入：场景中N个物体{O₁, O₂, ..., Oₙ}，每个物体有几何形状和位置信息。输出：所有发生碰撞的物体对集合{(Oᵢ, Oⱼ) | Oᵢ ∩ Oⱼ ≠ ∅}。工程上不会直接对所有对做精确检测。</p>
        </div>
      </div>
      <div class="content-block">
        <div class="block-inner">
          <h2 data-slot="block2Heading">分层流水线架构</h2>
          <p data-slot="block2Copy">分两个阶段：粗筛阶段(Broad Phase)用轻量级近似方法快速排除不可能碰撞的对，输出候选集合；精算阶段(Narrow Phase)只对候选对做精确几何判定。四叉树和SAP属于粗筛阶段，GJK属于精算阶段。这种分层设计是现代游戏引擎的通用架构。</p>
        </div>
      </div>
    </div>
  </div>


</body></html>
