<!DOCTYPE html><html lang="zh-CN"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, height=1080">
  <title>Content-Three-Columns</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    .slide {
      width: 1920px;
      height: 1080px;
      background-color: #FFFFFF;
      font-family: 'PingFang SC', 'Microsoft YaHei', 'PingFang TC', 'Hiragino Sans GB', sans-serif;
      position: relative;
      overflow: hidden;
    }
    .title-block {
      position: absolute;
      left: 80px;
      top: 100px;
      width: 1680px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .title-block [data-slot="title"] {
      font-weight: 600;
      font-size: 64px;
      line-height: 1.25;
      color: #000000;
    }
    .title-block [data-slot="subtitle"] {
      font-weight: 400;
      font-size: 40px;
      line-height: 1.4;
      color: #000000;
      /* 等效灰色（避免 opacity 导出丢失） */
      color: #666666; /* black @ 60% on white */
    }
    .content-row {
      position: absolute;
      left: 80px;
      top: 304px;
      width: 1760px;
      height: 676px;
      display: flex;
      flex-direction: row;
      gap: 32px;
      align-items: stretch;
    }
    .content-card {
      flex: 1;
      background-color: #F1F1F1;
      border-radius: 16px;
      padding: 56px;
      display: flex;
      flex-direction: column;
      gap: 84px;
    }
    .card-image {
      width: 140px;
      height: 140px;
      border-radius: 12px;
      overflow: hidden;
      background-color: #FFFFFF;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card-image img {
      width: 72px;
      height: 72px;
      object-fit: contain;
    }
    .card-text {
      display: flex;
      flex-direction: column;
      gap: 27px;
      flex: 1;
    }
    .content-card [data-slot$="Heading"] {
      font-weight: 500;
      font-size: 40px;
      line-height: 1.22;
      color: #000000;
    }
    .content-card [data-slot$="Copy"] {
      font-weight: 400;
      font-size: 28px;
      line-height: 1.22;
      color: #000000;
      /* 等效灰色（避免 opacity 导出丢失） */
      color: #4D4D4D; /* black @ 70% on white */
    }
  </style>
</head>
<body>
  <div class="slide" data-template="content-three-columns">
    <div class="title-block">
      <h1 data-slot="title">四叉树——算法流程与复杂度</h1>
      <p data-slot="subtitle">Pseudocode &amp; Complexity</p>
    </div>
    <div class="content-row">
      <div class="content-card">
        <div class="card-image">
          <img data-slot="block1Image" src="data:image/svg+xml;base64,PCEtLSBAbGljZW5zZSBsdWNpZGUtc3RhdGljIHYwLjQ2OC4wIC0gSVNDIC0tPgo8c3ZnCiAgY2xhc3M9Imx1Y2lkZSBsdWNpZGUtY29kZSIKICB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciCiAgd2lkdGg9IjI0IgogIGhlaWdodD0iMjQiCiAgdmlld0JveD0iMCAwIDI0IDI0IgogIGZpbGw9Im5vbmUiCiAgc3Ryb2tlPSJjdXJyZW50Q29sb3IiCiAgc3Ryb2tlLXdpZHRoPSIyIgogIHN0cm9rZS1saW5lY2FwPSJyb3VuZCIKICBzdHJva2UtbGluZWpvaW49InJvdW5kIgo+CiAgPHBvbHlsaW5lIHBvaW50cz0iMTYgMTggMjIgMTIgMTYgNiIgLz4KICA8cG9seWxpbmUgcG9pbnRzPSI4IDYgMiAxMiA4IDE4IiAvPgo8L3N2Zz4K" alt="">
        </div>
        <div class="card-text">
          <h2 data-slot="block1Heading">插入操作</h2>
          <p data-slot="block1Copy">插入时，对象数未超限就直接存入节点；超限则分裂为4个子节点，递归插入到包含该对象的子节点中。这是四叉树构建的核心操作。</p>
        </div>
      </div>
      <div class="content-card">
        <div class="card-image">
          <img data-slot="block2Image" src="data:image/svg+xml;base64,PCEtLSBAbGljZW5zZSBsdWNpZGUtc3RhdGljIHYwLjQ2OC4wIC0gSVNDIC0tPgo8c3ZnCiAgY2xhc3M9Imx1Y2lkZSBsdWNpZGUtc2VhcmNoIgogIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyIKICB3aWR0aD0iMjQiCiAgaGVpZ2h0PSIyNCIKICB2aWV3Qm94PSIwIDAgMjQgMjQiCiAgZmlsbD0ibm9uZSIKICBzdHJva2U9ImN1cnJlbnRDb2xvciIKICBzdHJva2Utd2lkdGg9IjIiCiAgc3Ryb2tlLWxpbmVjYXA9InJvdW5kIgogIHN0cm9rZS1saW5lam9pbj0icm91bmQiCj4KICA8Y2lyY2xlIGN4PSIxMSIgY3k9IjExIiByPSI4IiAvPgogIDxwYXRoIGQ9Im0yMSAyMS00LjMtNC4zIiAvPgo8L3N2Zz4K" alt="">
        </div>
        <div class="card-text">
          <h2 data-slot="block2Heading">范围查询</h2>
          <p data-slot="block2Copy">查询时，节点与范围不相交则直接剪枝；否则搜索当前节点对象和子节点。平均情况下，单次查询O(log n)，保证不遗漏任何可能碰撞的对象。</p>
        </div>
      </div>
      <div class="content-card">
        <div class="card-image">
          <img data-slot="block3Image" src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxNDAiIGhlaWdodD0iMTQwIiB2aWV3Qm94PSIwIDAgMTQwIDE0MCI+PHJlY3Qgd2lkdGg9IjEwMCUiIGhlaWdodD0iMTAwJSIgZmlsbD0iI0YxRjFGMSIvPjxwYXRoIGZpbGw9IiM5OTkiIGQ9Im01OC41MiA1OS42MDUtNC41NS0uODFxLjUyLTMuNjQgMi4wMy02LjM4IDEuNTEtMi43NSAzLjc2LTQuNTkgMi4yNi0xLjg0IDUuMTgtMi43NiAyLjkyLS45MyA2LjI5LS45MyAzLjUgMCA2LjMxIDEgMi44Mi45OSA0LjgyIDIuNzYgMS45OSAxLjc3IDMuMDYgNC4xNXQxLjA3IDUuMTRxMCAyLjQyLS41NSA0LjI2LS41NCAxLjgzLTEuNTYgMy4yLTEuMDEgMS4zNi0yLjUxIDIuMzEtMS41MS45NC0zLjQgMS41NyA0LjU1IDEuNDQgNi43OSA0LjM4dDIuMjQgNy4zOHEwIDMuNzgtMS40IDYuNjktMS40IDIuOS0zLjc4IDQuODh0LTUuNTEgMi45OXEtMy4xMyAxLjAyLTYuNjMgMS4wMi0zLjgyIDAtNi42NS0uODgtMi44NC0uODctNC45NC0yLjU5LTIuMS0xLjcxLTMuNTctNC4yLTEuNDctMi40OC0yLjUyLTUuNzRsMy44MS0xLjU3cTEuNTEtLjYzIDIuODItLjMzIDEuMzIuMjkgMS45MSAxLjQxLjYzIDEuMjMgMS4zOCAyLjQyLjc2IDEuMTkgMS44MSAyLjEyIDEuMDUuOTIgMi40NiAxLjUgMS40Mi41OCAzLjM4LjU4IDIuMjEgMCAzLjg1LS43MiAxLjY1LS43MiAyLjc1LTEuODcgMS4xLTEuMTYgMS42NC0yLjU3LjU1LTEuNDIuNTUtMi44NiAwLTEuODItLjM5LTMuMy0uMzgtMS40OS0xLjYxLTIuNTQtMS4yMi0xLjA1LTMuNTItMS42NS0yLjI5LS41OS02LjE0LS41OXYtNi4xNnEzLjE4LS4wNCA1LjI5LS42IDIuMS0uNTYgMy4zNC0xLjU1IDEuMjQtMSAxLjczLTIuNHQuNDktMy4wOHEwLTMuNTctMS45OS01LjQzLTItMS44NS01LjMyLTEuODUtMS41NCAwLTIuODQuNDQtMS4yOS40My0yLjMzIDEuMjItMS4wMy43OS0xLjczIDEuODR0LTEuMDUgMi4zMXEtLjU5IDEuNjEtMS41NiAyLjEzLS45Ni41My0yLjcxLjI1Ii8+PC9zdmc+" alt="">
        </div>
        <div class="card-text">
          <h2 data-slot="block3Heading">复杂度分析</h2>
          <p data-slot="block3Copy">平均情况：构建O(n log n)，单次查询O(log n)，全场景检测O(n log n)。最坏情况——所有对象集中在同一区域——树会退化，退回到O(n²)。所以四叉树的效果高度依赖空间分布是否均匀。</p>
        </div>
      </div>
    </div>
  </div>
