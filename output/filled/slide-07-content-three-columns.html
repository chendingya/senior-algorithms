<!DOCTYPE html><html lang="zh-CN"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, height=1080">
  <title>Content-Three-Columns</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    .slide {
      width: 1920px;
      height: 1080px;
      background-color: #FFFFFF;
      font-family: 'PingFang SC', 'Microsoft YaHei', 'PingFang TC', 'Hiragino Sans GB', sans-serif;
      position: relative;
      overflow: hidden;
    }
    .title-block {
      position: absolute;
      left: 80px;
      top: 100px;
      width: 1680px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .title-block [data-slot="title"] {
      font-weight: 600;
      font-size: 64px;
      line-height: 1.25;
      color: #000000;
    }
    .title-block [data-slot="subtitle"] {
      font-weight: 400;
      font-size: 40px;
      line-height: 1.4;
      color: #000000;
      /* 等效灰色（避免 opacity 导出丢失） */
      color: #666666; /* black @ 60% on white */
    }
    .content-row {
      position: absolute;
      left: 80px;
      top: 304px;
      width: 1760px;
      height: 676px;
      display: flex;
      flex-direction: row;
      gap: 32px;
      align-items: stretch;
    }
    .content-card {
      flex: 1;
      background-color: #F1F1F1;
      border-radius: 16px;
      padding: 56px;
      display: flex;
      flex-direction: column;
      gap: 84px;
    }
    .card-image {
      width: 140px;
      height: 140px;
      border-radius: 12px;
      overflow: hidden;
      background-color: #FFFFFF;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card-image img {
      width: 72px;
      height: 72px;
      object-fit: contain;
    }
    .card-text {
      display: flex;
      flex-direction: column;
      gap: 27px;
      flex: 1;
    }
    .content-card [data-slot$="Heading"] {
      font-weight: 500;
      font-size: 40px;
      line-height: 1.22;
      color: #000000;
    }
    .content-card [data-slot$="Copy"] {
      font-weight: 400;
      font-size: 28px;
      line-height: 1.22;
      color: #000000;
      /* 等效灰色（避免 opacity 导出丢失） */
      color: #4D4D4D; /* black @ 70% on white */
    }
  </style>
</head>
<body>
  <div class="slide" data-template="content-three-columns">
    <div class="title-block">
      <h1 data-slot="title">四叉树——设计思想</h1>
      <p data-slot="subtitle">Design Philosophy</p>
    </div>
    <div class="content-row">
      <div class="content-card">
        <div class="card-image">
          <img data-slot="block1Image" src="data:image/svg+xml;base64,PCEtLSBAbGljZW5zZSBsdWNpZGUtc3RhdGljIHYwLjQ2OC4wIC0gSVNDIC0tPgo8c3ZnCiAgY2xhc3M9Imx1Y2lkZSBsdWNpZGUtZ2l0LWJyYW5jaCIKICB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciCiAgd2lkdGg9IjI0IgogIGhlaWdodD0iMjQiCiAgdmlld0JveD0iMCAwIDI0IDI0IgogIGZpbGw9Im5vbmUiCiAgc3Ryb2tlPSJjdXJyZW50Q29sb3IiCiAgc3Ryb2tlLXdpZHRoPSIyIgogIHN0cm9rZS1saW5lY2FwPSJyb3VuZCIKICBzdHJva2UtbGluZWpvaW49InJvdW5kIgo+CiAgPGxpbmUgeDE9IjYiIHgyPSI2IiB5MT0iMyIgeTI9IjE1IiAvPgogIDxjaXJjbGUgY3g9IjE4IiBjeT0iNiIgcj0iMyIgLz4KICA8Y2lyY2xlIGN4PSI2IiBjeT0iMTgiIHI9IjMiIC8+CiAgPHBhdGggZD0iTTE4IDlhOSA5IDAgMCAxLTkgOSIgLz4KPC9zdmc+Cg==" alt="">
        </div>
        <div class="card-text">
          <h2 data-slot="block1Heading">分治策略</h2>
          <p data-slot="block1Copy">四叉树的设计思想是「分治」——把二维地图递归划分为四个象限，区域内对象超阈值时继续分裂。直觉是：稀疏区域的对象不必和其他区域比较。</p>
        </div>
      </div>
      <div class="content-card">
        <div class="card-image">
          <img data-slot="block2Image" src="data:image/svg+xml;base64,PCEtLSBAbGljZW5zZSBsdWNpZGUtc3RhdGljIHYwLjQ2OC4wIC0gSVNDIC0tPgo8c3ZnCiAgY2xhc3M9Imx1Y2lkZSBsdWNpZGUtbWFwIgogIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyIKICB3aWR0aD0iMjQiCiAgaGVpZ2h0PSIyNCIKICB2aWV3Qm94PSIwIDAgMjQgMjQiCiAgZmlsbD0ibm9uZSIKICBzdHJva2U9ImN1cnJlbnRDb2xvciIKICBzdHJva2Utd2lkdGg9IjIiCiAgc3Ryb2tlLWxpbmVjYXA9InJvdW5kIgogIHN0cm9rZS1saW5lam9pbj0icm91bmQiCj4KICA8cGF0aCBkPSJNMTQuMTA2IDUuNTUzYTIgMiAwIDAgMCAxLjc4OCAwbDMuNjU5LTEuODNBMSAxIDAgMCAxIDIxIDQuNjE5djEyLjc2NGExIDEgMCAwIDEtLjU1My44OTRsLTQuNTUzIDIuMjc3YTIgMiAwIDAgMS0xLjc4OCAwbC00LjIxMi0yLjEwNmEyIDIgMCAwIDAtMS43ODggMGwtMy42NTkgMS44M0ExIDEgMCAwIDEgMyAxOS4zODFWNi42MThhMSAxIDAgMCAxIC41NTMtLjg5NGw0LjU1My0yLjI3N2EyIDIgMCAwIDEgMS43ODggMHoiIC8+CiAgPHBhdGggZD0iTTE1IDUuNzY0djE1IiAvPgogIDxwYXRoIGQ9Ik05IDMuMjM2djE1IiAvPgo8L3N2Zz4K" alt="">
        </div>
        <div class="card-text">
          <h2 data-slot="block2Heading">空间分区</h2>
          <p data-slot="block2Copy">类似「把地图分区管理」——每个管理员只负责自己地盘。查询时只在目标叶节点及相邻区域搜索，大幅缩小范围。对象少的区域不浪费计算，对象密的区域自动细分。</p>
        </div>
      </div>
      <div class="content-card">
        <div class="card-image">
          <img data-slot="block3Image" src="data:image/svg+xml;base64,PCEtLSBAbGljZW5zZSBsdWNpZGUtc3RhdGljIHYwLjQ2OC4wIC0gSVNDIC0tPgo8c3ZnCiAgY2xhc3M9Imx1Y2lkZSBsdWNpZGUtdGFyZ2V0IgogIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyIKICB3aWR0aD0iMjQiCiAgaGVpZ2h0PSIyNCIKICB2aWV3Qm94PSIwIDAgMjQgMjQiCiAgZmlsbD0ibm9uZSIKICBzdHJva2U9ImN1cnJlbnRDb2xvciIKICBzdHJva2Utd2lkdGg9IjIiCiAgc3Ryb2tlLWxpbmVjYXA9InJvdW5kIgogIHN0cm9rZS1saW5lam9pbj0icm91bmQiCj4KICA8Y2lyY2xlIGN4PSIxMiIgY3k9IjEyIiByPSIxMCIgLz4KICA8Y2lyY2xlIGN4PSIxMiIgY3k9IjEyIiByPSI2IiAvPgogIDxjaXJjbGUgY3g9IjEyIiBjeT0iMTIiIHI9IjIiIC8+Cjwvc3ZnPgo=" alt="">
        </div>
        <div class="card-text">
          <h2 data-slot="block3Heading">适用场景</h2>
          <p data-slot="block3Copy">四叉树非常适合二维稀疏场景。核心动作是递归分裂空间，设计策略是分治。不适用场景：高动态、对象密集的情况。</p>
        </div>
      </div>
    </div>
  </div>


</body></html>
