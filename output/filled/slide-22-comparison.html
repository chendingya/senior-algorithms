<!DOCTYPE html><html lang="zh-CN"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, height=1080">
  <title>Comparison</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    .slide {
      width: 1920px;
      height: 1080px;
      background-color: #FFFFFF;
      font-family: 'PingFang SC', 'Microsoft YaHei', 'PingFang TC', 'Hiragino Sans GB', sans-serif;
      position: relative;
      overflow: hidden;
    }
    .title-block {
      position: absolute;
      left: 80px;
      top: 100px;
      width: 1680px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .title-block [data-slot="title"] {
      font-weight: 600;
      font-size: 64px;
      line-height: 1.25;
      color: #000000;
    }
    .title-block [data-slot="subtitle"] {
      font-weight: 400;
      font-size: 40px;
      line-height: 1.4;
      color: #666666;
    }
    .comparison-row {
      position: absolute;
      left: 80px;
      top: 304px;
      width: 1760px;
      display: flex;
      flex-direction: row;
      gap: 32px;
      height: 676px;
      align-items: stretch;
    }
    .comparison-col {
      flex: 1;
      border-radius: 16px;
      padding: 48px 56px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .col-left {
      background-color: #E8F8EB;
    }
    .col-right {
      background-color: #F1F1F1;
    }
    .col-header {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-bottom: 36px;
      border-bottom: 2px solid rgba(0,0,0,0.08);
      margin-bottom: 36px;
      flex-shrink: 0;
    }
    .col-left .col-header { border-bottom-color: rgba(0,0,0,0.1); }
    .col-header [data-slot$="Label"] {
      font-weight: 600;
      font-size: 44px;
      line-height: 1.22;
      color: #000000;
    }
    .col-items {
      display: flex;
      flex-direction: column;
      gap: 24px;
      flex: 1;
    }
    .col-items [data-slot$="Item1"],
    .col-items [data-slot$="Item2"],
    .col-items [data-slot$="Item3"],
    .col-items [data-slot$="Item4"] {
      font-weight: 400;
      font-size: 28px;
      line-height: 1.43;
      color: #4D4D4D;
      padding-left: 24px;
      position: relative;
    }
    .col-items [data-slot$="Item1"]::before,
    .col-items [data-slot$="Item2"]::before,
    .col-items [data-slot$="Item3"]::before,
    .col-items [data-slot$="Item4"]::before {
      content: '';
      position: absolute;
      left: 0;
      top: 10px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: #73CD94;
    }
    .col-right .col-items [data-slot$="Item1"]::before,
    .col-right .col-items [data-slot$="Item2"]::before,
    .col-right .col-items [data-slot$="Item3"]::before,
    .col-right .col-items [data-slot$="Item4"]::before {
      background-color: #999999;
    }
  </style>
</head>
<body>
  <div class="slide" data-template="comparison">
    <div class="title-block">
      <h1 data-slot="title">总结对比——先快再准，先筛后算</h1>
      <p data-slot="subtitle">Comprehensive Comparison</p>
    </div>
    <div class="comparison-row">
      <div class="comparison-col col-left">
        <div class="col-header">
          <h2 data-slot="leftLabel">粗筛阶段</h2>
        </div>
        <div class="col-items">
          <p data-slot="leftItem1">四叉树：分治，适合稀疏2D场景</p>
          <p data-slot="leftItem2">SAP：降维+时间局部性，高动态首选</p>
          <p data-slot="leftItem3">四叉树平均O(n log n)，SAP后续帧O(n)</p>
          <p data-slot="leftItem4">共同目标：快速排除大量不可能的对</p>
        </div>
      </div>
      <div class="comparison-col col-right">
        <div class="col-header">
          <h2 data-slot="rightLabel">精算阶段</h2>
        </div>
        <div class="col-items">
          <p data-slot="rightItem1">GJK：迭代逼近，凸体判定精确高效</p>
          <p data-slot="rightItem2">迭代次数有常数上界（2D≤3次，3D≤4次）</p>
          <p data-slot="rightItem3">增量模式接近O(1)，空间O(1)</p>
          <p data-slot="rightItem4">只处理粗筛后的少量候选对</p>
        </div>
      </div>
    </div>
  </div>


</body></html>
